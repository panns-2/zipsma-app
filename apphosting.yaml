# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure
runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
  # Set a timeout for server responses.
  timeoutSeconds: 120
repository:
  owner: Panns-2
  name: zipsma-app
  branch: main
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyAh558UOucYesb5CDrmCFJS9pJu7q5qqBg"
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "zip-sma.firebaseapp.com"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "zip-sma"
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "zip-sma.firebasestorage.app"
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "641452454332"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:641452454332:web:5b665c368380c00360bbb9"
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: "https://zip-sma-default-rtdb.firebaseio.com"

secretEnv:
  - secret: CRON_SECRET
    env: CRON_SECRET
  - secret: TWILIO_ACCOUNT_SID
    env: TWILIO_ACCOUNT_SID
  - secret: TWILIO_AUTH_TOKEN
    env: TWILIO_AUTH_TOKEN
  - secret: TWILIO_PHONE_NUMBER
    env: TWILIO_PHONE_NUMBER
    
